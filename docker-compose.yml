services:
  postgres-db:
    image: postgres:17-alpine
    container_name: orders_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-db:
    image: mongo:6.0
    container_name: audit_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ADMIN}
      MONGO_INITDB_ROOT_PASSWORD: ${PASSWORD}
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  staffing-orders:
    build:
      context: .
      dockerfile: Dockerfile.orders
    container_name: orders_service
    ports:
      - '3000:3000' # Mapeado al puerto de producción en .env.local
    env_file:
      - .env.local # Usa el archivo con hosts de docker (postgres-db)
    environment:
      - NODE_ENV=production # Crucial para que NestJS elija .env.local
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - app-network

  staffing-audit:
    build:
      context: .
      dockerfile: Dockerfile.audit
    container_name: audit_service
    ports:
      - '3001:3001' # Mapeado al puerto de producción en .env.local
    env_file:
      - .env.local # Cambiado a .env.local para que vea a 'staffing-audit' como host
    environment:
      - NODE_ENV=production
    depends_on:
      - mongo-db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
