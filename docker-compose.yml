services:
  postgres-db:
    image: postgres:17-alpine
    container_name: orders_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo-db:
    image: mongo:6.0
    container_name: audit_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ADMIN}
      MONGO_INITDB_ROOT_PASSWORD: ${PASSWORD}
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  staffing-orders:
    build:
      context: .
      dockerfile: Dockerfile.orders
    container_name: orders_service
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - postgres-db

  staffing-audit:
    build:
      context: .
      dockerfile: Dockerfile.audit
    container_name: audit_service
    ports:
      - '3001:3001'
    env_file:
      - .env
    depends_on:
      - mongo-db

volumes:
  postgres_data:
  mongo_data:
